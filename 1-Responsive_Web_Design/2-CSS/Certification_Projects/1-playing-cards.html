<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Playing Cards</title>
        <link rel="stylesheet" href="1-playing-cards.css" />
    </head>

    <body>
        <h1>Playing Cards</h1>
        <main id="playing-cards">
            <div class="card black">
                <div class="left">
                    <div>A</div>
                    <div>♠</div>
                </div>
                <div class="middle">
                    <div>♠</div>
                </div>
                <div class="right inverted">
                    <div>A</div>
                    <div>♠</div>
                </div>
            </div>
            <div class="card black">
                <div class="left">
                    <div>A</div>
                    <div>♣</div>
                </div>
                <div class="middle">
                    <div>♣</div>
                </div>
                <div class="right inverted">
                    <div>A</div>
                    <div>♣</div>
                </div>
            </div>
            <div class="card red">
                <div class="left">
                    <div>A</div>
                    <div>♥</div>
                </div>
                <div class="middle">
                    <div>♥</div>
                </div>
                <div class="right inverted">
                    <div>A</div>
                    <div>♥</div>
                </div>
            </div>
            <div class="card red">
                <div class="left">
                    <div>A</div>
                    <div>♦</div>
                </div>
                <div class="middle">
                    <div>♦</div>
                </div>
                <div class="right inverted">
                    <div>A</div>
                    <div>♦</div>
                </div>
            </div>
            <div class="card black">
                <div class="left">
                    <div>A</div>
                    <div>♣</div>
                </div>
                <div class="middle">
                    <div>♣</div>
                </div>
                <div class="right inverted">
                    <div>A</div>
                    <div>♣</div>
                </div>
            </div>
        </main>
    </body>
</html>
