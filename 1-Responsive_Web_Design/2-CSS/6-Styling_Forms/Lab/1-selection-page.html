<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Selection Feature Page</title>
        <link rel="stylesheet" href="1-selection-page.css" />
    </head>

    <body>
        <div id="page">
            <h1>Feature Selection</h1>
            <div class="feature-card-container">
                <label for="cloud" class="feature-card">
                    <h2>Cloud storage</h2>
                    <input type="checkbox" name="cloud" id="cloud" />
                    <p class="feature-info">100 Gigabyte secure storage</p>
                </label>

                <label for="support" class="feature-card">
                    <h2>Dedicated Support</h2>
                    <input type="checkbox" name="support" id="support" />
                    <p class="feature-info">24/7 customer help</p>
                </label>

                <label for="analytics" class="feature-card">
                    <h2>Advanced Analytics</h2>
                    <input type="checkbox" name="analytics" id="analytics" />
                    <p class="feature-info">Insights & reports</p>
                </label>

                <label for="themes" class="feature-card">
                    <h2>Customer User Themes</h2>
                    <input type="checkbox" name="themes" id="themes" />
                    <p class="feature-info">Personalized dashboard design</p>
                </label>

                <label for="collab" class="feature-card">
                    <h2>Multi-User Collab</h2>
                    <input type="checkbox" name="collab" id="collab" />
                    <p class="feature-info">Team access and sharing</p>
                </label>

                <label for="api" class="feature-card">
                    <h2>API Access</h2>
                    <input type="checkbox" name="api" id="api" />
                    <p class="feature-info">
                        Integrate with your custom built tools
                    </p>
                </label>
            </div>
        </div>
    </body>
</html>
